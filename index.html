<!DOCTYPE html>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        width:100vw;
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background:black;
        font-family:Arial, sans-serif;
    }

    .player{
        position:relative;
        width:500px;
        height:500px;
    }

    /* Layer 0 */
    .border{
        position:absolute;
        width:100%;
        height:100%;
        object-fit:contain;
        z-index:0;
        pointer-events:none;
    }

    /* Layer 2 */
    .album-cover{
        position:absolute;
        width:250px;
        height:250px;
        border-radius:50%;
        object-fit:cover;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        z-index:2;
        box-shadow:0 0 20px rgba(0,0,0,0.7);
    }

    /* Layer 3 */
    .cd{
        position:absolute;
        width:320px;
        height:320px;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        z-index:3;
        opacity:0.7;
        pointer-events:none;
    }

    .spin{
        animation:spin 5s linear infinite;
    }

    @keyframes spin{
        from{
            transform:translate(-50%, -50%) rotate(0deg);
        }
        to{
            transform:translate(-50%, -50%) rotate(360deg);
        }
    }

    .controls{
        position:absolute;
        width:100%;
        bottom:35px;
        display:flex;
        justify-content:center;
        align-items:center;
        gap:25px;
        z-index:5;
    }

    .btn{
        width:70px;
        height:70px;
        cursor:pointer;
        transition:0.2s;
        user-select:none;
    }

    .btn:hover{
        transform:scale(1.1);
    }

</style>
</head>

<body>

    <!-- Layer 0 -->
    <img src="Border.webp" class="border">

    <!-- Layer 2 -->
    <img id="cover" class="album-cover">

    <!-- Layer 3 -->

    <div class="controls">

        <!-- Play/Pause Toggle -->
        <img id="playPauseBtn" class="btn" src="Play.webp">

        <!-- Random -->
        <img id="randomBtn" class="btn" src="Random.webp">

        <!-- Download -->
        <img id="downloadBtn" class="btn" src="Download.webp">

let player;
let currentSong;
let isPlaying = false;

const playPauseBtn = document.getElementById("playPauseBtn");
const randomBtn = document.getElementById("randomBtn");
const downloadBtn = document.getElementById("downloadBtn");
const cover = document.getElementById("cover");
const cd = document.getElementById("cd");

function startSpin(){
    cd.classList.add("spin");
    cover.classList.add("spin");
}

function stopSpin(){
    cd.classList.remove("spin");
    cover.classList.remove("spin");
}

function randomSong(){

    currentSong = songs[Math.floor(Math.random() * songs.length)];

    cover.src = currentSong.cover;

    if(player){
        player.loadVideoById(currentSong.videoId);
    }

    startSpin();

    playPauseBtn.src = "Pause.webp";
    isPlaying = true;
}

function onYouTubeIframeAPIReady(){

    currentSong = songs[Math.floor(Math.random() * songs.length)];

    cover.src = currentSong.cover;

    player = new YT.Player('player', {

        height: '0',
        width: '0',

        videoId: currentSong.videoId,

        playerVars: {
            autoplay: 1,
            controls: 0
        },

        events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
        }

    });
}

function onPlayerReady(event){

    event.target.playVideo();

    isPlaying = true;

    playPauseBtn.src = "Pause.webp";

    startSpin();
}

function onPlayerStateChange(event){

    if(event.data === 0){
        randomSong();
    }
}

playPauseBtn.addEventListener("click", ()=>{

    if(!player) return;

    if(isPlaying){

        player.pauseVideo();

        playPauseBtn.src = "Play.webp";

        stopSpin();

        isPlaying = false;

    }else{

        player.playVideo();

        playPauseBtn.src = "Pause.webp";

        startSpin();

        isPlaying = true;
    }
});

randomBtn.addEventListener("click", ()=>{

    randomSong();
});

downloadBtn.addEventListener("click", ()=>{

    window.open(
        `https://ssyoutube.com/watch?v=${currentSong.videoId}`,
        "_blank"
    );

});
