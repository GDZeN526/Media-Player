<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        repeating-linear-gradient(
            0deg,
            #000 0px,
            #000 2px,
            #050505 2px,
            #050505 4px
        );
    font-family:"Courier New", monospace;
    filter:blur(0.6px) contrast(1.15);
}

.player{
    position:relative;
    width:520px;
    height:520px;
    filter:
        saturate(0.8)
        contrast(1.2);
}

/* Border */
.border{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    z-index:0;
    pointer-events:none;
}

/* Album Cover */
.album-cover{
    position:absolute;
    width:250px;
    height:250px;
    object-fit:cover;
    top:50%;
    left:50%;
    transform:translate(-50%, -56%);
    z-index:2;

    border:
        4px solid rgba(255,255,255,0.15);

    filter:
        blur(1px)
        contrast(1.2)
        saturate(0.85);

    box-shadow:
        0 0 30px rgba(0,0,0,0.8);
}

/* VHS Noise */
.noise{
    position:absolute;
    inset:0;
    z-index:20;
    pointer-events:none;
    opacity:0.12;
    mix-blend-mode:screen;
    background-image:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* Song Info */
.song-info{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    text-align:center;
    z-index:10;
    color:white;
    text-shadow:2px 2px black;
}

.song-title{
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
    margin-bottom:6px;
}

.song-artist{
    font-size:14px;
    opacity:0.8;
    letter-spacing:1px;
}

/* Timestamp */
.timestamp{
    position:absolute;
    bottom:115px;
    left:50%;
    transform:translateX(-50%);
    color:#d8d8d8;
    font-size:16px;
    z-index:10;
    letter-spacing:2px;
    text-shadow:2px 2px black;
}

/* Controls */
.controls{
    position:absolute;
    width:100%;
    bottom:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:24px;
    z-index:10;
}

.btn{
    width:70px;
    height:70px;
    cursor:pointer;
    transition:0.15s;
    filter:
        blur(0.5px)
        contrast(1.2);
}

.btn:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<div class="player">

    <!-- Border -->
    <img src="Border.webp" class="border">

    <!-- Song Info -->
    <div class="song-info">

        <div class="song-title" id="songTitle">
            LOADING...
        </div>

        <div class="song-artist" id="songArtist">
            PLEASE WAIT
        </div>

    </div>

    <!-- Cover -->
    <img id="cover" class="album-cover">

    <!-- Timestamp -->
    <div class="timestamp" id="timestamp">
        0:00 / 0:00
    </div>

    <!-- Controls -->
    <div class="controls">

        <!-- Toggle Button -->
        <img id="playPauseBtn"
        class="btn"
        src="Play.webp">

        <!-- Random -->
        <img id="randomBtn"
        class="btn"
        src="Random.webp">

        <!-- Download -->
        <img id="downloadBtn"
        class="btn"
        src="Download.webp">

    </div>

    <!-- Noise -->
    <div class="noise"></div>

</div>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const songs = [

{
title:"Heartless",
artist:"Kanye West",
videoId:"Co0tTeuUVhU",
cover:"https://i.ytimg.com/vi/Co0tTeuUVhU/maxresdefault.jpg"
},

{
title:"Power",
artist:"Kanye West",
videoId:"L53gjP-TtGE",
cover:"https://i.ytimg.com/vi/L53gjP-TtGE/maxresdefault.jpg"
},

{
title:"HUMBLE.",
artist:"Kendrick Lamar",
videoId:"tvTRZJ-4EyI",
cover:"https://i.ytimg.com/vi/tvTRZJ-4EyI/maxresdefault.jpg"
},

{
title:"DNA.",
artist:"Kendrick Lamar",
videoId:"NLZRYQMLDW4",
cover:"https://i.ytimg.com/vi/NLZRYQMLDW4/maxresdefault.jpg"
},

{
title:"Blinding Lights",
artist:"The Weeknd",
videoId:"4NRXx6U8ABQ",
cover:"https://i.ytimg.com/vi/4NRXx6U8ABQ/maxresdefault.jpg"
},

{
title:"Starboy",
artist:"The Weeknd",
videoId:"34Na4j8AVgA",
cover:"https://i.ytimg.com/vi/34Na4j8AVgA/maxresdefault.jpg"
},

{
title:"Magnolia",
artist:"Playboi Carti",
videoId:"oCveByMXd_0",
cover:"https://i.ytimg.com/vi/oCveByMXd_0/maxresdefault.jpg"
},

{
title:"Sky",
artist:"Playboi Carti",
videoId:"KnumAWWWgUE",
cover:"https://i.ytimg.com/vi/KnumAWWWgUE/maxresdefault.jpg"
},

{
title:"EARFQUAKE",
artist:"Tyler, The Creator",
videoId:"HmAsUQEFYGI",
cover:"https://i.ytimg.com/vi/HmAsUQEFYGI/maxresdefault.jpg"
},

{
title:"See You Again",
artist:"Tyler, The Creator",
videoId:"TGgcC5xg9YI",
cover:"https://i.ytimg.com/vi/TGgcC5xg9YI/maxresdefault.jpg"
}

];

let player;
let currentSong;
let isPlaying = false;

const cover =
document.getElementById("cover");

const songTitle =
document.getElementById("songTitle");

const songArtist =
document.getElementById("songArtist");

const timestamp =
document.getElementById("timestamp");

const playPauseBtn =
document.getElementById("playPauseBtn");

const randomBtn =
document.getElementById("randomBtn");

const downloadBtn =
document.getElementById("downloadBtn");

/* Random Song */
function randomSong(){

    currentSong =
    songs[Math.floor(Math.random()*songs.length)];

    cover.src = currentSong.cover;

    songTitle.innerText =
    currentSong.title.toUpperCase();

    songArtist.innerText =
    currentSong.artist.toUpperCase();

    if(player){

        player.loadVideoById(currentSong.videoId);

        isPlaying = true;

        /* same sprite */
        playPauseBtn.style.opacity = "0.6";
    }
}

/* YouTube */
function onYouTubeIframeAPIReady(){

    currentSong =
    songs[Math.floor(Math.random()*songs.length)];

    cover.src = currentSong.cover;

    songTitle.innerText =
    currentSong.title.toUpperCase();

    songArtist.innerText =
    currentSong.artist.toUpperCase();

    player = new YT.Player('player',{

        height:'0',
        width:'0',

        videoId:currentSong.videoId,

        playerVars:{
            autoplay:1,
            controls:0
        },

        events:{
            'onReady':onPlayerReady,
            'onStateChange':onPlayerStateChange
        }

    });
}

function onPlayerReady(event){

    event.target.playVideo();

    isPlaying = true;

    /* same sprite */
    playPauseBtn.style.opacity = "0.6";

    updateTimestamp();
}

function onPlayerStateChange(event){

    if(event.data === 0){
        randomSong();
    }
}

/* Toggle */
playPauseBtn.addEventListener("click",()=>{

    if(!player) return;

    if(isPlaying){

        player.pauseVideo();

        isPlaying = false;

        /* same sprite */
        playPauseBtn.style.opacity = "1";

    }else{

        player.playVideo();

        isPlaying = true;

        /* same sprite */
        playPauseBtn.style.opacity = "0.6";
    }

});

/* Random */
randomBtn.addEventListener("click",()=>{

    randomSong();

});

/* Download */
downloadBtn.addEventListener("click",()=>{

    window.open(
        `https://ssyoutube.com/watch?v=${currentSong.videoId}`,
        "_blank"
    );

});

/* Timestamp */
function formatTime(sec){

    sec = Math.floor(sec);

    let minutes =
    Math.floor(sec / 60);

    let seconds =
    sec % 60;

    if(seconds < 10)
        seconds = "0" + seconds;

    return minutes + ":" + seconds;
}

function updateTimestamp(){

    setInterval(()=>{

        if(player && player.getCurrentTime){

            let current =
            player.getCurrentTime();

            let duration =
            player.getDuration();

            timestamp.innerText =
            `${formatTime(current)} / ${formatTime(duration)}`;

        }

    },500);
}

</script>

</body>
   </html>
