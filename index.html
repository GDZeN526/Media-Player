<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    repeating-linear-gradient(
        0deg,
        #000 0px,
        #000 2px,
        #050505 2px,
        #050505 4px
    );

    font-family:"Courier New", monospace;

    filter:
        blur(0.6px)
        contrast(1.15);
}

.player{
    position:relative;
    width:520px;
    height:520px;
}

/* BORDER */
.border{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    z-index:0;
    pointer-events:none;
}

/* COVER */
.album-cover{
    position:absolute;

    width:250px;
    height:250px;

    object-fit:cover;

    top:50%;
    left:50%;

    transform:translate(-50%, -56%);

    z-index:2;

    border:
    4px solid rgba(255,255,255,0.15);

    background:#111;

    filter:
        blur(1px)
        contrast(1.2)
        saturate(0.8);

    box-shadow:
        0 0 30px rgba(0,0,0,0.8);
}

/* SONG INFO */
.song-info{
    position:absolute;

    top:40px;
    left:50%;

    transform:translateX(-50%);

    width:80%;

    text-align:center;

    color:white;

    z-index:10;

    text-shadow:2px 2px black;
}

.song-title{
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
}

.song-artist{
    font-size:14px;
    opacity:0.8;
    letter-spacing:1px;
    margin-top:5px;
}

/* STATUS */
.status{
    position:absolute;

    top:105px;
    width:100%;

    text-align:center;

    color:#cfcfcf;

    z-index:10;

    font-size:13px;

    letter-spacing:3px;

    text-shadow:2px 2px black;
}

/* TIMESTAMP */
.timestamp{
    position:absolute;

    bottom:115px;
    left:50%;

    transform:translateX(-50%);

    color:#d8d8d8;

    font-size:16px;

    letter-spacing:2px;

    z-index:10;

    text-shadow:2px 2px black;
}

/* CONTROLS */
.controls{
    position:absolute;

    width:100%;
    bottom:30px;

    display:flex;

    justify-content:center;
    align-items:center;

    gap:24px;

    z-index:10;
}

.play-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.btn{
    width:70px;
    height:70px;

    cursor:pointer;

    transition:0.15s;

    filter:
        blur(0.5px)
        contrast(1.2);
}

.btn:hover{
    transform:scale(1.08);
}

/* PLAY TEXT */
.play-text{
    color:white;

    font-size:12px;

    letter-spacing:3px;

    text-shadow:2px 2px black;

    opacity:0.8;
}

/* VHS NOISE */
.noise{
    position:absolute;
    inset:0;

    z-index:20;

    pointer-events:none;

    opacity:0.08;

    background:
    repeating-linear-gradient(
        transparent 0px,
        rgba(255,255,255,0.03) 2px,
        transparent 4px
    );
}

</style>
</head>

<body>

<div class="player">

    <!-- BORDER -->
    <img src="Border.webp" class="border">

    <!-- SONG INFO -->
    <div class="song-info">

        <div
            class="song-title"
            id="songTitle">

            LOADING...

        </div>

        <div
            class="song-artist"
            id="songArtist">

            PLEASE WAIT

        </div>

    </div>

    <!-- STATUS -->
    <div
        class="status"
        id="statusText">

        LOADED

    </div>

    <!-- COVER -->
    <img
        id="cover"
        class="album-cover"
        src="">

    <!-- TIMESTAMP -->
    <div
        class="timestamp"
        id="timestamp">

        0:00 / 0:00

    </div>

    <!-- CONTROLS -->
    <div class="controls">

        <!-- PLAY -->
        <div class="play-wrapper">

            <img
                id="playPauseBtn"
                class="btn"
                src="Play.webp">

            <div
                id="playText"
                class="play-text">

                PLAY

            </div>

        </div>

        <!-- RANDOM -->
        <img
            id="randomBtn"
            class="btn"
            src="Random.webp">

        <!-- DOWNLOAD -->
        <img
            id="downloadBtn"
            class="btn"
            src="Download.webp">

    </div>

    <!-- NOISE -->
    <div class="noise"></div>

</div>

<!-- HIDDEN PLAYER -->
<div
    id="player"
    style="
        opacity:0;
        pointer-events:none;
        position:absolute;
    ">
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* SONGS */
const songs = [

{
title:"Heartless",
artist:"Kanye West",
videoId:"Co0tTeuUVhU",
cover:"https://img.youtube.com/vi/Co0tTeuUVhU/hqdefault.jpg"
},

{
title:"Power",
artist:"Kanye West",
videoId:"L53gjP-TtGE",
cover:"https://img.youtube.com/vi/L53gjP-TtGE/hqdefault.jpg"
},

{
title:"HUMBLE.",
artist:"Kendrick Lamar",
videoId:"tvTRZJ-4EyI",
cover:"https://img.youtube.com/vi/tvTRZJ-4EyI/hqdefault.jpg"
},

{
title:"DNA.",
artist:"Kendrick Lamar",
videoId:"NLZRYQMLDW4",
cover:"https://img.youtube.com/vi/NLZRYQMLDW4/hqdefault.jpg"
},

{
title:"Blinding Lights",
artist:"The Weeknd",
videoId:"4NRXx6U8ABQ",
cover:"https://img.youtube.com/vi/4NRXx6U8ABQ/hqdefault.jpg"
},

{
title:"Starboy",
artist:"The Weeknd",
videoId:"34Na4j8AVgA",
cover:"https://img.youtube.com/vi/34Na4j8AVgA/hqdefault.jpg"
},

{
title:"Magnolia",
artist:"Playboi Carti",
videoId:"oCveByMXd_0",
cover:"https://img.youtube.com/vi/oCveByMXd_0/hqdefault.jpg"
},

{
title:"Sky",
artist:"Playboi Carti",
videoId:"KnumAWWWgUE",
cover:"https://img.youtube.com/vi/KnumAWWWgUE/hqdefault.jpg"
},

{
title:"EARFQUAKE",
artist:"Tyler, The Creator",
videoId:"HmAsUQEFYGI",
cover:"https://img.youtube.com/vi/HmAsUQEFYGI/hqdefault.jpg"
},

{
title:"See You Again",
artist:"Tyler, The Creator",
videoId:"TGgcC5xg9YI",
cover:"https://img.youtube.com/vi/TGgcC5xg9YI/hqdefault.jpg"
}

];

let player;
let currentSong;
let isPlaying = false;

/* ELEMENTS */
const cover =
document.getElementById("cover");

const songTitle =
document.getElementById("songTitle");

const songArtist =
document.getElementById("songArtist");

const timestamp =
document.getElementById("timestamp");

const statusText =
document.getElementById("statusText");

const playPauseBtn =
document.getElementById("playPauseBtn");

const playText =
document.getElementById("playText");

const randomBtn =
document.getElementById("randomBtn");

const downloadBtn =
document.getElementById("downloadBtn");

/* LOAD SONG */
function loadSong(song){

    currentSong = song;

    cover.src = song.cover;

    songTitle.innerText =
    song.title.toUpperCase();

    songArtist.innerText =
    song.artist.toUpperCase();

    if(player){

        player.loadVideoById(song.videoId);

    }

}

/* RANDOM SONG */
function randomSong(){

    const random =
    songs[Math.floor(
        Math.random()*songs.length
    )];

    loadSong(random);

}

/* YOUTUBE API */
function onYouTubeIframeAPIReady(){

    const random =
    songs[Math.floor(
        Math.random()*songs.length
    )];

    currentSong = random;

    cover.src = random.cover;

    songTitle.innerText =
    random.title.toUpperCase();

    songArtist.innerText =
    random.artist.toUpperCase();

    player = new YT.Player('player',{

        height:'0',
        width:'0',

        videoId:random.videoId,

        playerVars:{
            autoplay:0,
            controls:0
        },

        events:{
            onReady:onPlayerReady,
            onStateChange:onPlayerStateChange
        }

    });

}

/* READY */
function onPlayerReady(){

    statusText.innerText =
    "READY";

}

/* STATE CHANGE */
function onPlayerStateChange(event){

    /* PLAYING */
    if(event.data === YT.PlayerState.PLAYING){

        isPlaying = true;

        playText.innerText =
        "PAUSE";

        statusText.innerText =
        "NOW PLAYING";

        playPauseBtn.style.opacity =
        "0.6";

    }

    /* PAUSED */
    if(event.data === YT.PlayerState.PAUSED){

        isPlaying = false;

        playText.innerText =
        "PLAY";

        statusText.innerText =
        "PAUSED";

        playPauseBtn.style.opacity =
        "1";

    }

    /* ENDED */
    if(event.data === YT.PlayerState.ENDED){

        randomSong();

        setTimeout(()=>{

            player.playVideo();

        },300);

    }

}

/* PLAY / PAUSE */
playPauseBtn.addEventListener("click",()=>{

    if(!player) return;

    if(isPlaying){

        player.pauseVideo();

    }

    else{

        player.playVideo();

    }

});

/* RANDOM */
randomBtn.addEventListener("click",()=>{

    randomSong();

    setTimeout(()=>{

        player.playVideo();

    },300);

});

/* DOWNLOAD */
downloadBtn.addEventListener("click",()=>{

    window.open(
        `https://ssyoutube.com/watch?v=${currentSong.videoId}`,
        "_blank"
    );

});

/* TIME FORMAT */
function formatTime(sec){

    sec = Math.floor(sec);

    let minutes =
    Math.floor(sec / 60);

    let seconds =
    sec % 60;

    if(seconds < 10)
        seconds = "0" + seconds;

    return minutes + ":" + seconds;
}

/* TIMESTAMP */
setInterval(()=>{

    if(player &&
       player.getCurrentTime){

        let current =
        player.getCurrentTime();

        let duration =
        player.getDuration();

        if(duration){

            timestamp.innerText =
            `${formatTime(current)} / ${formatTime(duration)}`;

        }

    }

},500);

</script>

</body>
</html>
