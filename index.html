<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hip-Hop Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    image-rendering:pixelated;
}

body{
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
}

/* OLD WEBSITE FILTER */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;

    backdrop-filter:blur(2px);

    background:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
    );
}

/* PLAYER */

.player{
    position:relative;
    width:420px;
    height:620px;
}

/* LAYER 1 */

.border{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    pointer-events:none;
}

/* LAYER 2 */

.cover{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    width:260px;
    height:260px;
    object-fit:cover;
    border-radius:10px;
    z-index:2;
    box-shadow:0 0 30px rgba(255,255,255,0.15);
}

/* INFO */

.info{
    position:absolute;
    top:345px;
    width:100%;
    text-align:center;
    z-index:3;
    padding:0 30px;
}

.song-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:8px;
}

.artist{
    opacity:0.7;
    font-size:15px;
}

/* TIMESTAMP */

.progress-wrapper{
    position:absolute;
    bottom:130px;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    z-index:3;
}

.time{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:12px;
}

.slider{
    width:100%;
    appearance:none;
    height:8px;
    border-radius:999px;
    background:#444;
    cursor:pointer;
}

.slider::-webkit-slider-thumb{
    appearance:none;
    width:16px;
    height:16px;
    border-radius:50%;
    background:white;
    cursor:pointer;
}

/* CONTROLS */

.controls{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:25px;
    z-index:3;
}

.btn{
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    color:white;
    font-size:12px;
}

.btn img{
    width:58px;
    height:58px;
    object-fit:contain;
    transition:0.2s;
}

.btn:hover img{
    transform:scale(1.08);
}

audio{
    display:none;
}

</style>
</head>

<body>

<div class="player">

    <!-- LAYER 1 -->
    <img src="Border.webp" class="border">

    <!-- LAYER 2 -->
    <img id="cover" class="cover">

    <!-- SONG INFO -->
    <div class="info">
        <div class="song-title" id="title">Loading...</div>
        <div class="artist" id="artist">Loading...</div>
    </div>

    <!-- TIMESTAMP -->
    <div class="progress-wrapper">

        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <input
        type="range"
        min="0"
        max="100"
        value="0"
        class="slider"
        id="progress">

    </div>

    <!-- LAYER 3 -->
    <div class="controls">

        <!-- PLAY -->
        <button class="btn" id="playBtn">
            <img src="Play.webp">
            <span id="playText">Play</span>
        </button>

        <!-- SHUFFLE -->
        <button class="btn" id="shuffleBtn">
            <img src="Random.webp">
            <span>Shuffle</span>
        </button>

        <!-- DOWNLOAD -->
        <button class="btn" id="downloadBtn">
            <img src="Download.webp">
            <span>Download</span>
        </button>

    </div>

</div>

<audio id="audio"></audio>

<script>

/*
====================================================
WORKING SONGS
====================================================
*/

const songs = [

{
title:"HUMBLE.",
artist:"Kendrick Lamar",
cover:"https://upload.wikimedia.org/wikipedia/en/5/51/Kendrick_Lamar_-_Damn.png",
audio:"https://files.catbox.moe/8xq1u9.mp3"
},

{
title:"Stronger",
artist:"Kanye West",
cover:"https://upload.wikimedia.org/wikipedia/en/f/f4/Graduation_%28album%29.jpg",
audio:"https://files.catbox.moe/5r8f0u.mp3"
},

{
title:"EARFQUAKE",
artist:"Tyler, The Creator",
cover:"https://upload.wikimedia.org/wikipedia/en/d/d3/Igor_-_Tyler%2C_the_Creator.jpg",
audio:"https://files.catbox.moe/t3kt1x.mp3"
},

{
title:"Blinding Lights",
artist:"The Weeknd",
cover:"https://upload.wikimedia.org/wikipedia/en/c/c1/The_Weeknd_-_Blinding_Lights.png",
audio:"https://files.catbox.moe/jq9b8m.mp3"
},

{
title:"Sky",
artist:"Playboi Carti",
cover:"https://upload.wikimedia.org/wikipedia/en/a/a8/Whole_Lotta_Red.png",
audio:"https://files.catbox.moe/cc4j2d.mp3"
}

];

/*
====================================================
ELEMENTS
====================================================
*/

const audio = document.getElementById("audio");

const cover = document.getElementById("cover");

const title = document.getElementById("title");

const artist = document.getElementById("artist");

const playBtn = document.getElementById("playBtn");

const playText = document.getElementById("playText");

const shuffleBtn = document.getElementById("shuffleBtn");

const downloadBtn = document.getElementById("downloadBtn");

const progress = document.getElementById("progress");

const current = document.getElementById("current");

const duration = document.getElementById("duration");

/*
====================================================
LOAD SONG
====================================================
*/

let currentSong = 0;

function loadSong(index){

    const song = songs[index];

    title.textContent = song.title;

    artist.textContent = song.artist;

    cover.src = song.cover;

    audio.src = song.audio;
}

loadSong(currentSong);

/*
====================================================
PLAY / PAUSE
====================================================
*/

playBtn.addEventListener("click", ()=>{

    if(audio.paused){

        audio.play();

        playText.textContent = "Pause";

    }else{

        audio.pause();

        playText.textContent = "Play";

    }

});

/*
====================================================
SHUFFLE
====================================================
*/

shuffleBtn.addEventListener("click", ()=>{

    currentSong = Math.floor(Math.random()*songs.length);

    loadSong(currentSong);

    audio.play();

    playText.textContent = "Pause";

});

/*
====================================================
DOWNLOAD
====================================================
*/

downloadBtn.addEventListener("click", ()=>{

    const a = document.createElement("a");

    a.href = songs[currentSong].audio;

    a.download = songs[currentSong].title + ".mp3";

    a.click();

});

/*
====================================================
UPDATE TIME
====================================================
*/

audio.addEventListener("timeupdate", ()=>{

    const value =
    (audio.currentTime / audio.duration) * 100;

    progress.value = value;

    current.textContent =
    formatTime(audio.currentTime);

    duration.textContent =
    formatTime(audio.duration);

});

/*
====================================================
SEEK MUSIC
====================================================
*/

progress.addEventListener("input", ()=>{

    audio.currentTime =
    (progress.value / 100) * audio.duration;

});

/*
====================================================
AUTO NEXT
====================================================
*/

audio.addEventListener("ended", ()=>{

    currentSong++;

    if(currentSong >= songs.length){

        currentSong = 0;

    }

    loadSong(currentSong);

    audio.play();

});

/*
====================================================
FORMAT TIME
====================================================
*/

function formatTime(time){

    if(isNaN(time)) return "0:00";

    const minutes = Math.floor(time / 60);

    let seconds = Math.floor(time % 60);

    if(seconds < 10){

        seconds = "0" + seconds;

    }

    return minutes + ":" + seconds;

}

</script>

</body>
    </html>
