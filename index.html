<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Hip-Hop Media Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    image-rendering: pixelated;
}

body{
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    color:white;
}

/* OLD WEBSITE FILTER */
body::after{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter: blur(2px) contrast(1.1);
    background:
        repeating-linear-gradient(
            0deg,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 1px,
            transparent 2px,
            transparent 4px
        );
    pointer-events:none;
    z-index:9999;
}

/* PLAYER */
.player{
    position:relative;
    width:380px;
    height:520px;
}

/* LAYER 1 BORDER */
.border{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    pointer-events:none;
}

/* LAYER 2 COVER */
.cover{
    position:absolute;
    top:55px;
    left:50%;
    transform:translateX(-50%);
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:6px;
    z-index:2;
    filter:contrast(1.1) saturate(0.9);
}

/* INFO */
.info{
    position:absolute;
    bottom:145px;
    width:100%;
    text-align:center;
    z-index:3;
}

.song-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:5px;
}

.artist{
    opacity:0.8;
    font-size:14px;
}

/* TIMESTAMP */
.progress-container{
    position:absolute;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    width:280px;
    z-index:3;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:6px;
}

.progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:999px;
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:white;
}

/* BUTTONS */
.controls{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:25px;
    align-items:center;
    z-index:3;
}

.btn{
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
    gap:5px;
    font-size:12px;
}

.btn img{
    width:52px;
    height:52px;
    object-fit:contain;
    transition:0.2s;
}

.btn:hover img{
    transform:scale(1.08);
}

audio{
    display:none;
}
</style>
</head>

<body>

<div class="player">

    <!-- LAYER 1 -->
    <img src="Border.webp" class="border">

    <!-- LAYER 2 -->
    <img id="cover" class="cover">

    <!-- INFO -->
    <div class="info">
        <div id="title" class="song-title"></div>
        <div id="artist" class="artist"></div>
    </div>

    <!-- TIMESTAMP -->
    <div class="progress-container">
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>

    <!-- LAYER 3 -->
    <div class="controls">

        <!-- PLAY -->
        <button class="btn" id="playBtn">
            <img src="Play.webp">
            <span id="playText">Play</span>
        </button>

        <!-- RANDOM -->
        <button class="btn" id="shuffleBtn">
            <img src="Random.webp">
            <span>Shuffle</span>
        </button>

        <!-- DOWNLOAD -->
        <button class="btn" id="downloadBtn">
            <img src="Download.webp">
            <span>Download</span>
        </button>

    </div>

</div>

<audio id="audio"></audio>

<script>
/*
====================================================
YOUTUBE MUSIC STYLE PLAYLIST
(Replace audio URLs with your own MP3 links)
====================================================
*/

const songs = [

/* Kendrick Lamar */
{
    title:"HUMBLE.",
    artist:"Kendrick Lamar",
    cover:"https://i.imgur.com/YqK0K1v.jpeg",
    audio:"https://music.youtube.com/watch?v=H4RELGc9su8&si=IACddRaDUsu3JuS5"
},
{
    title:"DNA.",
    artist:"Kendrick Lamar",
    cover:"https://i.imgur.com/YqK0K1v.jpeg",
    audio:"https://music.youtube.com/watch?v=Fb3j_yuFh1s&si=4tZl2HDZpk8cho5_"
},

/* Kanye West */
{
    title:"Stronger",
    artist:"Kanye West",
    cover:"https://i.imgur.com/3VQ9Z8p.jpeg",
    audio:"https://music.youtube.com/watch?v=12hLNbXKCs4&si=LybtFC1pXUYWrKQt"
},
{
    title:"Heartless",
    artist:"Kanye West",
    cover:"https://i.imgur.com/3VQ9Z8p.jpeg",
    audio:"https://music.youtube.com/watch?v=s40BTpfAELs&si=vYzXp4iESHQQBPaT"
},
    
/* Tyler The Creator */
{
    title:"See You Again",
    artist:"Tyler, The Creator",
    cover:"https://i.imgur.com/l49aYS3.jpeg",
    audio:"https://music.youtube.com/watch?v=EZE62LpaqHg&si=7M0Xd1137RdUC0DI"
},
{
    title:"EARFQUAKE",
    artist:"Tyler, The Creator",
    cover:"https://i.imgur.com/l49aYS3.jpeg",
    audio:"https://music.youtube.com/watch?v=t-E2gm0a_N0&si=ICf00xO-BGcbH_jH"
},

/* The Weeknd */
{
    title:"Blinding Lights",
    artist:"The Weeknd",
    cover:"https://i.imgur.com/Zm7sJ6K.jpeg",
    audio:"https://music.youtube.com/watch?v=J7p4bzqLvCw&si=7uL8oV9B4X6PAjO9"
},
{
    title:"Starboy",
    artist:"The Weeknd",
    cover:"https://i.imgur.com/Zm7sJ6K.jpeg",
    audio:"https://music.youtube.com/watch?v=3_g2un5M350&si=2_tUMLNMh-lTOWQt"
},

/* Playboi Carti */
{
    title:"Sky",
    artist:"Playboi Carti",
    cover:"https://i.imgur.com/Nw6L7bM.jpeg",
    audio:"https://music.youtube.com/watch?v=6l_8PMBgymE&si=aXBzlAU4NM5Urii6"
},
{
    title:"Magnolia",
    artist:"Playboi Carti",
    cover:"https://i.imgur.com/Nw6L7bM.jpeg",
    audio:"https://music.youtube.com/watch?v=sMrruvN56HA&si=lxGPfik9Sb_DSEsX"
}

];

const audio = document.getElementById("audio");

const cover = document.getElementById("cover");
const title = document.getElementById("title");
const artist = document.getElementById("artist");

const playBtn = document.getElementById("playBtn");
const playText = document.getElementById("playText");

const shuffleBtn = document.getElementById("shuffleBtn");
const downloadBtn = document.getElementById("downloadBtn");

const progressBar = document.getElementById("progressBar");

const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

let currentSong = 0;

/* LOAD SONG */
function loadSong(index){

    const song = songs[index];

    title.textContent = song.title;
    artist.textContent = song.artist;
    cover.src = song.cover;

    audio.src = song.audio;
}

loadSong(currentSong);

/* PLAY / PAUSE */
playBtn.addEventListener("click", () => {

    if(audio.paused){

        audio.play();
        playText.textContent = "Pause";

    } else {

        audio.pause();
        playText.textContent = "Play";

    }

});

/* SHUFFLE */
shuffleBtn.addEventListener("click", () => {

    currentSong = Math.floor(Math.random() * songs.length);

    loadSong(currentSong);

    audio.play();

    playText.textContent = "Pause";

});

/* DOWNLOAD */
downloadBtn.addEventListener("click", () => {

    const link = document.createElement("a");

    link.href = songs[currentSong].audio;

    link.download = songs[currentSong].title + ".mp3";

    link.click();

});

/* UPDATE BAR */
audio.addEventListener("timeupdate", () => {

    const progress =
        (audio.currentTime / audio.duration) * 100;

    progressBar.style.width = progress + "%";

    currentTimeEl.textContent =
        formatTime(audio.currentTime);

    durationEl.textContent =
        formatTime(audio.duration);

});

/* FORMAT TIME */
function formatTime(time){

    if(isNaN(time)) return "0:00";

    const minutes = Math.floor(time / 60);

    let seconds = Math.floor(time % 60);

    if(seconds < 10){
        seconds = "0" + seconds;
    }

    return minutes + ":" + seconds;
}

/* AUTO NEXT SONG */
audio.addEventListener("ended", () => {

    currentSong++;

    if(currentSong >= songs.length){
        currentSong = 0;
    }

    loadSong(currentSong);

    audio.play();

});

</script>

</body>
</html>
