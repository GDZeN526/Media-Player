<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        repeating-linear-gradient(
            0deg,
            #000 0px,
            #000 2px,
            #050505 2px,
            #050505 4px
        );
    font-family:"Courier New", monospace;
    filter:blur(0.6px) contrast(1.15);
}

.player{
    position:relative;
    width:520px;
    height:520px;
    filter:saturate(0.8) contrast(1.2);
}

/* Border */
.border{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    z-index:0;
    pointer-events:none;
}

/* Album Cover */
.album-cover{
    position:absolute;
    width:250px;
    height:250px;
    object-fit:cover;
    top:50%;
    left:50%;
    transform:translate(-50%, -56%);
    z-index:2;

    border:4px solid rgba(255,255,255,0.15);

    filter:
        blur(1px)
        contrast(1.2)
        saturate(0.85);

    box-shadow:
        0 0 30px rgba(0,0,0,0.8);

    background:#111;
}

/* VHS Noise */
.noise{
    position:absolute;
    inset:0;
    z-index:20;
    pointer-events:none;
    opacity:0.08;

    background:
    repeating-linear-gradient(
        transparent 0px,
        rgba(255,255,255,0.03) 2px,
        transparent 4px
    );
}

/* Song Info */
.song-info{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    text-align:center;
    z-index:10;
    color:white;
    text-shadow:2px 2px black;
}

.song-title{
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
    margin-bottom:6px;
}

.song-artist{
    font-size:14px;
    opacity:0.8;
    letter-spacing:1px;
}

/* Play/Pause Status */
.status{
    position:absolute;
    top:110px;
    width:100%;
    text-align:center;
    z-index:10;
    color:#bdbdbd;
    font-size:13px;
    letter-spacing:3px;
    text-shadow:2px 2px black;
}

/* Timestamp */
.timestamp{
    position:absolute;
    bottom:115px;
    left:50%;
    transform:translateX(-50%);
    color:#d8d8d8;
    font-size:16px;
    z-index:10;
    letter-spacing:2px;
    text-shadow:2px 2px black;
}

/* Controls */
.controls{
    position:absolute;
    width:100%;
    bottom:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:24px;
    z-index:10;
}

.btn{
    width:70px;
    height:70px;
    cursor:pointer;
    transition:0.15s;

    filter:
        blur(0.5px)
        contrast(1.2);
}

.btn:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<div class="player">

    <!-- Border -->
    <img src="Border.webp" class="border">

    <!-- Song Info -->
    <div class="song-info">

        <div class="song-title" id="songTitle">
            LOADING...
        </div>

        <div class="song-artist" id="songArtist">
            PLEASE WAIT
        </div>

    </div>

    <!-- Status -->
    <div class="status" id="statusText">
        PRESS PLAY
    </div>

    <!-- Cover -->
    <img
        id="cover"
        class="album-cover"
        src=""
        crossorigin="anonymous"
    >

    <!-- Timestamp -->
    <div class="timestamp" id="timestamp">
        0:00 / 0:00
    </div>

    <!-- Controls -->
    <div class="controls">

        <!-- Play/Pause -->
        <img
            id="playPauseBtn"
            class="btn"
            src="Play.webp"
        >

        <!-- Random -->
        <img
            id="randomBtn"
            class="btn"
            src="Random.webp"
        >

        <!-- Download -->
        <img
            id="downloadBtn"
            class="btn"
            src="Download.webp"
        >

    </div>

    <!-- Noise -->
    <div class="noise"></div>

</div>

<!-- Hidden YouTube Player -->
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* Songs */
const songs = [

{
title:"Heartless",
artist:"Kanye West",
videoId:"Co0tTeuUVhU",
cover:"https://img.youtube.com/vi/Co0tTeuUVhU/hqdefault.jpg"
},

{
title:"Power",
artist:"Kanye West",
videoId:"L53gjP-TtGE",
cover:"https://img.youtube.com/vi/L53gjP-TtGE/hqdefault.jpg"
},

{
title:"HUMBLE.",
artist:"Kendrick Lamar",
videoId:"tvTRZJ-4EyI",
cover:"https://img.youtube.com/vi/tvTRZJ-4EyI/hqdefault.jpg"
},

{
title:"DNA.",
artist:"Kendrick Lamar",
videoId:"NLZRYQMLDW4",
cover:"https://img.youtube.com/vi/NLZRYQMLDW4/hqdefault.jpg"
},

{
title:"Blinding Lights",
artist:"The Weeknd",
videoId:"4NRXx6U8ABQ",
cover:"https://img.youtube.com/vi/4NRXx6U8ABQ/hqdefault.jpg"
},

{
title:"Starboy",
artist:"The Weeknd",
videoId:"34Na4j8AVgA",
cover:"https://img.youtube.com/vi/34Na4j8AVgA/hqdefault.jpg"
},

{
title:"Magnolia",
artist:"Playboi Carti",
videoId:"oCveByMXd_0",
cover:"https://img.youtube.com/vi/oCveByMXd_0/hqdefault.jpg"
},

{
title:"Sky",
artist:"Playboi Carti",
videoId:"KnumAWWWgUE",
cover:"https://img.youtube.com/vi/KnumAWWWgUE/hqdefault.jpg"
},

{
title:"EARFQUAKE",
artist:"Tyler, The Creator",
videoId:"HmAsUQEFYGI",
cover:"https://img.youtube.com/vi/HmAsUQEFYGI/hqdefault.jpg"
},

{
title:"See You Again",
artist:"Tyler, The Creator",
videoId:"TGgcC5xg9YI",
cover:"https://img.youtube.com/vi/TGgcC5xg9YI/hqdefault.jpg"
}

];

let player;
let currentSong;
let isPlaying = false;

/* Elements */
const cover =
document.getElementById("cover");

const songTitle =
document.getElementById("songTitle");

const songArtist =
document.getElementById("songArtist");

const timestamp =
document.getElementById("timestamp");

const statusText =
document.getElementById("statusText");

const playPauseBtn =
document.getElementById("playPauseBtn");

const randomBtn =
document.getElementById("randomBtn");

const downloadBtn =
document.getElementById("downloadBtn");

/* Load Song */
function loadSong(song){

    currentSong = song;

    cover.src = song.cover;

    songTitle.innerText =
    song.title.toUpperCase();

    songArtist.innerText =
    song.artist.toUpperCase();

    if(player){

        player.loadVideoById(song.videoId);

    }
}

/* Random Song */
function randomSong(){

    const random =
    songs[Math.floor(Math.random()*songs.length)];

    loadSong(random);

}

/* YouTube Ready */
function onYouTubeIframeAPIReady(){

    const random =
    songs[Math.floor(Math.random()*songs.length)];

    currentSong = random;

    cover.src = random.cover;

    songTitle.innerText =
    random.title.toUpperCase();

    songArtist.innerText =
    random.artist.toUpperCase();

    player = new YT.Player('player',{

        height:'0',
        width:'0',

        videoId:random.videoId,

        playerVars:{
            autoplay:0,
            controls:0
        },

        events:{
            onReady:onPlayerReady,
            onStateChange:onPlayerStateChange
        }

    });

}

/* Ready */
function onPlayerReady(){

    statusText.innerText =
    "READY TO PLAY";

}

/* Player States */
function onPlayerStateChange(event){

    if(event.data === YT.PlayerState.PLAYING){

        isPlaying = true;

        statusText.innerText =
        "NOW PLAYING";

        playPauseBtn.style.opacity = "0.6";

    }

    if(event.data === YT.PlayerState.PAUSED){

        isPlaying = false;

        statusText.innerText =
        "PAUSED";

        playPauseBtn.style.opacity = "1";

    }

    if(event.data === YT.PlayerState.ENDED){

        randomSong();

    }

}

/* Play/Pause */
playPauseBtn.addEventListener("click",()=>{

    if(!player) return;

    if(isPlaying){

        player.pauseVideo();

    }else{

        player.playVideo();

    }

});

/* Random */
randomBtn.addEventListener("click",()=>{

    randomSong();

    setTimeout(()=>{

        player.playVideo();

    },500);

});

/* Download */
downloadBtn.addEventListener("click",()=>{

    window.open(
        `https://ssyoutube.com/watch?v=${currentSong.videoId}`,
        "_blank"
    );

});

/* Time Format */
function formatTime(sec){

    sec = Math.floor(sec);

    let minutes =
    Math.floor(sec / 60);

    let seconds =
    sec % 60;

    if(seconds < 10)
        seconds = "0" + seconds;

    return minutes + ":" + seconds;
}

/* Timestamp Update */
setInterval(()=>{

    if(player && player.getCurrentTime){

        let current =
        player.getCurrentTime();

        let duration =
        player.getDuration();

        if(duration){

            timestamp.innerText =
            `${formatTime(current)} / ${formatTime(duration)}`;

        }

    }

},500);

</script>

</body>
</html>
